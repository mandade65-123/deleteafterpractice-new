apiVersion: v1
kind: Pod
metadata:   
    name: lbpod
    labels:
       app: lbpod
spec:
   containers:
      - image: nginx:latest
        ports:
            - containerPort: 80
        name: nginxcont

---
apiVersion: v1
kind: Service
metadata:
   name: lbservice
spec:
  selector:
     app: lbpod
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP


