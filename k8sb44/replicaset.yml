apiVersion:  apps/v1 
kind: ReplicaSet
metadata: 
    name: webapprs
    labels:
       app:  webapprs    
spec:
    replicas: 3
    selector: 
      matchLabels:
         app: nginxpodrs
    template:
        metadata:  #tags , assigning metadata to pod 
            labels:
                 app: nginxpodrs
        spec:  #pod specifications.
          containers:
              - name: nginxpodrs
                image: nginx:latest #containers images that will be used to create pod
                ports:
                  - containerPort: 80 #container port 
                    
