apiVersion: apps/v1
kind: Deployment
metadata:
     name: mederp
     labels: 
         app: mederp
spec:
   replicas: 4
   selector:
      matchLabels:
        app: mederp
   strategy:
         type : RollingUpdate
         rollingUpdate:
            maxSurge: 1
            maxUnavailable: 1
   template: 
      metadata:
          name: mederp
          labels: 
             app: mederp
      spec:
          containers:
            - name: mederp
              image: nginx
              ports:
                  - name: nginx
                    containerPort: 80
                    protocol: TCP


            
