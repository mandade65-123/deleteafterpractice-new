apiVersion:  networking.k8s.io/v1 
kind: Ingress
metadata:
        name: ingress
        annotations:
             nginx.ingress.kubernetes.io/rewrite-target: /
spec:     
    ingressClassName: nginx
    rules:
      - host: aa3565fa4380647e7b24e795799e16e4-2113508791.ap-south-1.elb.amazonaws.com 
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                  name: tcci
                  port:
                      number: 80
          - path: /tomcat
            pathType: Prefix
            backend:
              service:
                  name: tcci
                  port:
                      number: 8080           






