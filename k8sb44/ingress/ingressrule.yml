apiVersion:  networking.k8s.io/v1 
kind: ingress
metadata:
        name: ingress
        annotations:
             nginx.ingress.kubernetes.io/rewrite-target: /
spec:     
    ingressClassName: nginx
    rules:
      - host:
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                  name: tcci
                  port:
                      number: 80
          - path: /tomcat
            pathType: Prefix
            backend:
              service:
                  name: tcci
                  port:
                      number: 8080           






