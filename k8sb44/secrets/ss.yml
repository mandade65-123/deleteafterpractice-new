apiVersion:  apps/v1 
kind:  StatefulSet
metadata:  
     name: ssdb1
     labels:
        app: ssdb1
spec:
   replicas: 1
   selector:
      matchLabels:
        app: ssdb1
   template:
      metadata:
          name: ssdb1
          labels:
            app: ssdb1
      spec:
         containers:
         - name: ssdb1
           image: mysql:latest 
           ports:
             - containerPort: 3306
               protocol: TCP 
           env: 
             - name: MYSQL_ROOT_PASSWORD 
               valueFrom: 
                  secretKeyRef:
                      name: ssdb-secret
                      key: root_pw