apiVersion:  apps/v1 
kind:  StatefulSet
metadata:  
     name: ssdb2
     labels:
        app: ssdb2
spec:
   replicas: 3 
   selector:
      matchLabels:
        app: ssdb2
   template:
      metadata:
          name: ssdb2
          labels:
            app: ssdb2
      spec:
         containers:
         - name: ssdb2
           image: mysql:latest 
           ports:
             - containerPort: 3306
               protocol: TCP 
           env: 
             - name: MYSQL_ROOT_PASSWORD 
               valueFrom:
                  configMapKeyRef:
                      name: ssdb-config
                      key: root_pw