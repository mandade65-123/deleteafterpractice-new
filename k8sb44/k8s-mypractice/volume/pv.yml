apiVersion: v1
kind:  PersistentVolume
metadata:
    name: pv-volume
    labels:
        app: pv
spec:
    storageClassName: standard
    volumeMode: Filesystem
    accessModes:
      - ReadWriteOnce
    capacity:
      storage: 10Gi
    persistentVolumeReclaimPolicy: Recycle
    hostPath:
      path: "/mnt/data"   
          

